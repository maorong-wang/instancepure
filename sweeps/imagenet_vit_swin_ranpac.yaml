program: test.py
method: grid
project: instantpure-hira-ranpac-purification
name: imagenet-purification-hira-ranpac
metric:
  name: robust_accuracy
  goal: maximize
parameters:
  purifier_name:
    value: instantpure
  model:
    value: LCM
  attack_method:
    value: diff_pgd
  output_dir:
    value: output
  lora_input_dir:
    value: pretrained/oscp_checkpoint/checkpoint-20000
  num_validation_set:
    value: 1000
  num_inference_step:
    value: 5
  strength:
    values: [0.2]
  guidance_scale:
    value: 1.0
  control_scale:
    value: 0.8
  diffusion_respace:
    value: ddim50
  diffusion_timestep:
    value: 150
  classifier:
    values:
      - vit_small
      - vit_tiny
      - swin_b
      - swin_s
  use_hira_adapter:
    values: [true]
  hira_expansion_dim:
    value: 16384
  use_ranpac_head:
    values: [true]
  hira_num_blocks:
    value: 4
  hira_batch_size:
    value: 128
  hira_num_workers:
    value: 4
  hira_epochs:
    value: 1
  hira_lr:
    value: 0.0001
  hira_weight_decay:
    value: 0.0001
  hira_seed:
    value: 0
  hira_cache_dir:
    value: pretrained/hira
  hira_dataset_root:
    value: ./dataset/imagenet
  hira_max_train_samples:
    value: -1
  hira_force_retrain:
    value: false
  adapt_noise_eps:
    value: 0.0
  adapt_noise_num:
    value: 1
  adapt_alpha:
    value: 1.0
  soft_threshold_alpha:
    value: 0.9
  soft_threshold_beta:
    value: 4.0
  soft_threshold_stat_eps:
    value: 1.0e-6
  soft_threshold_mode:
    value: away_from_mean
  stability_ridge_gamma:
    value: 0.0
  stability_ridge_stat_eps:
    value: 1.0e-6
  ranpac_rp_dim:
    value: 10000
  ranpac_selection_method:
    value: regression
  ranpac_lambda:
    value: 0.5
  ranpac_temp:
    value: 1.0
  ranpac_hardneg_topk:
    value: 0
  ranpac_hardneg_gamma:
    value: 0.0
  ranpac_batch_size:
    value: 64
  ranpac_num_workers:
    value: 4
  ranpac_seed:
    value: 0
  ranpac_cache_dir:
    value: pretrained/ranpac
  ranpac_dataset_root:
    value: ./dataset/imagenet
  device:
    value: "cuda:0"
  seed:
    value: 0
  use_wandb:
    value: true
  wandb_project:
    value: instantpure-hira-ranpac
  wandb_group:
    value: imagenet-purification-hira-ranpac
  wandb_mode:
    value: online
  eps:
    values: [4]
  atk_iter:
    value: 100
command:
  - ${env}
  - ${interpreter}
  - ${program}
  - ${args}

