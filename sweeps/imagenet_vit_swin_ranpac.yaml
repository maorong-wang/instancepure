program: test.py
method: grid
project: instantpure
name: imagenet-vit-swin-ranpac
metric:
  name: robust_accuracy
  goal: maximize
parameters:
  model:
    value: LCM
  attack_method:
    value: Linf_pgd
  output_dir:
    value: output
  lora_input_dir:
    value: pretrained/oscp_checkpoint/checkpoint-20000
  num_validation_set:
    value: 1000
  num_inference_step:
    value: 5
  strength:
    values: [0.2]
  guidance_scale:
    value: 1.0
  control_scale:
    value: 0.8
  classifier:
    values: [vit_base]
  use_ranpac_head:
    values: [false, true]
  ranpac_rp_dim:
    value: 10000
  ranpac_batch_size:
    value: 256
  ranpac_num_workers:
    value: 8
  ranpac_seed:
    value: 0
  ranpac_dataset_root:
    value: ./dataset/imagenet
  device:
    value: "cuda:0"
  seed:
    value: 3407
  use_wandb:
    value: true
  wandb_project:
    value: instantpure
  wandb_group:
    value: imagenet-vit-swin-ranpac
  wandb_mode:
    value: online
  eps:
    values: [2, 4, 8]
  atk_iter:
    values: [100, 40]
command:
  - ${env}
  - ${interpreter}
  - ${program}
  - ${args}
