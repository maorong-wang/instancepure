program: test.py
method: grid
project: instantpure-diffpgd
name: imagenet-vit-swin-diffpgd-hira-ranpac
metric:
  name: robust_accuracy
  goal: maximize
parameters:
  model:
    value: LCM
  attack_method:
    value: Linf_pgd
  attack_version:
    value: v2
  output_dir:
    value: output
  lora_input_dir:
    value: pretrained/oscp_checkpoint/checkpoint-20000
  num_validation_set:
    value: 1000
  num_inference_step:
    value: 5
  strength:
    values: [0.2]
  guidance_scale:
    value: 1.0
  control_scale:
    value: 0.8
  classifier:
    values: [vit_base]
  use_hira_adapter:
    values: [false, true]
  hira_expansion_dim:
    value: 32768
  use_ranpac_head:
    values: [false, true]
  hira_num_blocks:
    values: [2]
  hira_batch_size:
    value: 256
  hira_num_workers:
    value: 8
  hira_seed:
    value: 0
  hira_cache_dir:
    value: pretrained/hira
  hira_dataset_root:
    value: ./dataset/imagenet
  hira_max_train_samples:
    value: -1
  hira_force_retrain:
    value: false
  adapt_noise_eps:
    value: 0.0
  adapt_noise_num:
    value: 0
  adapt_alpha:
    value: 1.0
  soft_threshold_alpha:
    values: [0.0, 0.1, 0.2, 0.35, 0.5]
  soft_threshold_beta:
    values: [2.0, 4.0, 8.0, 16.0]
  soft_threshold_stat_eps:
    value: 1.0e-6
  ranpac_rp_dim:
    value: 8192
  ranpac_lambda:
    value: 1.0
  ranpac_temp:
    value: 1.0
  ranpac_hardneg_topk:
    value: 9
  ranpac_hardneg_gamma:
    value: 1.0
  ranpac_batch_size:
    value: 256
  ranpac_num_workers:
    value: 8
  ranpac_seed:
    value: 0
  ranpac_dataset_root:
    value: ./dataset/imagenet
  device:
    value: "cuda:0"
  seed:
    value: 3407
  use_wandb:
    value: true
  wandb_project:
    value: instantpure
  wandb_group:
    value: imagenet-vit-swin-diffpgd-hira-ranpac
  wandb_mode:
    value: online
  eps:
    values: [8, 4]
  atk_iter:
    values: [100]
command:
  - ${env}
  - ${interpreter}
  - ${program}
  - ${args}
