program: eval_robustbench_ranpac.py
method: grid
project: robustbench-ranpac-hira-rc-sweep_depth
name: robustbench-ranpac-hira-imagenet
metric:
  name: robust_acc
  goal: maximize
parameters:
  dataset:
    value: imagenet
  threat_model:
    value: Linf
  data_dir:
    value: ./dataset/imagenet
  model_dir:
    value: ./robustbench_models
  model_names:
    values:
      # - Liu2023Comprehensive_Swin-L
      - Xu2024MIMIR_Swin-L
  use_hira:
    values: [true]
  use_ranpac:
    values: [true]
  attack_method:
    values: [autoattack]
  eval_examples:
    value: 5000
  eval_split:
    value: test
  eval_batch_size:
    value: 128
  num_workers:
    value: 4
  eps:
    value: 0.0156862745
  pgd_steps:
    value: 40
  pgd_random_start:
    value: true
  autoattack_version:
    values: [standard]
  hira_expansion_dim:
    values: [16384]
  hira_num_blocks:
    values: [4]
  hira_batch_size:
    value: 128
  hira_num_workers:
    value: 4
  hira_epochs:
    value: 1
  hira_lr:
    value: 0.0001
  hira_weight_decay:
    value: 0.0001
  hira_seed:
    value: 0
  hira_cache_dir:
    value: pretrained/hira_robustbench
  hira_dataset_root:
    value: ./dataset/imagenet
  hira_max_train_samples:
    values: [100000]
  hira_force_retrain:
    value: false
  adapt_noise_eps:
    value: 0.04705882352
  adapt_noise_num:
    value: 1
  adapt_alpha:
    value: 1
  soft_threshold_alpha:
    values: [.9]
  soft_threshold_beta:
    values: [2.0, 4.0, 16.0, 32.0]
  soft_threshold_stat_eps:
    value: 1.0e-6
  soft_threshold_mode:
    values: ["away_from_mean"]
  stability_ridge_gamma:
    values: [0.0]
  stability_ridge_stat_eps:
    value: 1.0e-6
  ranpac_rp_dim:
    values: [10000]
  ranpac_lambda:
    values: [.5]
  ranpac_temp:
    value: 1
  ranpac_hardneg_topk:
    value: 0
  ranpac_hardneg_gamma:
    value: 0.0
  ranpac_fit_batch_size:
    value: 64
  ranpac_cache_dir:
    value: pretrained/ranpac_robustbench
  seed:
    value: 0
  device:
    value: cuda:0
  use_wandb:
    value: true
  wandb_project:
    value: robustbench-ranpac
  wandb_group:
    value: robustbench-ranpac-hira-imagenet
  wandb_mode:
    value: online
command:
  - ${env}
  - ${interpreter}
  - ${program}
  - ${args}
